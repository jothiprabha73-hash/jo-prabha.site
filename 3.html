<!DOCTYPE html>
<html lang="en">
<head>
    <title>joebrabha-official website</title>
    <meta name="description" content="Welcome to joebrabha's official website. Learn more about joebrabha here.">  
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta charset="UTF-8">
    <title>MY LOVE</title>
    <style>
        /* Full page background structure */
        body {
            margin: 0; 
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Background image setup (Glassmorphism look aaga) */
            background: url("jothi.jpg") center center/cover no-repeat;
            font-family: 'Segoe UI', Tahoma,Verdana, sans-serif;
        }

        /* Glassmorphism Card Effect */
        .glass-card {
            background: rgba(255, 255, 255, 0.1); /* Transparent white */
            backdrop-filter: blur(15px); /* Blurry glass effect */
            -webkit-backdrop-filter: blur(15px); /* Safari support */
            border: 1px solid rgba(255, 255, 255, 0.2); /* Soft white border */
            border-radius: 20px; /* Smooth corners */
            padding: 30px;
            width: 550px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); /* Dark shadow for depth */
        }

        h1 {
            color: #ffffff;
            letter-spacing: 5px;
            margin-bottom: 20px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* Image styling inside the glass card */
        .glass-card img {
            width: 90%;
            height: auto;
            max-width: 550px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1>JOTHI RAJ &amp; PRABHA</h1>
        <img src="jothi2.png" alt="jothi Image" width="500" height="500">
